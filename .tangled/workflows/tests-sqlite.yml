when:
  - event: ["push", "pull_request"]
    branch: ["master", "main"]

engine: microvm
image: nixos

dependencies:
  # php82 in nixpkgs includes sqlite3 and pdo_sqlite by default.
  # See pkgs/development/interpreters/php/default.nix in nixpkgs.
  - php82
  - php82Packages.composer
  - git
  - curl
  - unzip
  - gnutar
  - gzip

clone:
  depth: 1
  submodules: false

steps:
  - name: "Install Composer dependencies"
    command: composer install --no-interaction --prefer-source

  - name: "Set up SQLite WordPress test suite"
    command: bash bin/install-wp-tests-sqlite.sh

  - name: "Run SQLite tests"
    command: vendor/bin/phpunit -c phpunit.sqlite.xml.dist
