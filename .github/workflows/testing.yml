name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [mysql, sqlite]
        include:
          - database: mysql
            phpunit-config: phpunit.xml.dist
          - database: sqlite
            phpunit-config: phpunit.sqlite.xml.dist

    name: ${{ matrix.database }} tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, sqlite3, pdo_sqlite
          coverage: none

      - name: Prepare SQLite dependency
        run: git clone --depth 1 --branch trunk https://github.com/WordPress/sqlite-database-integration.git /tmp/sqlite-database-integration

      - name: Install Composer dependencies
        # Replace the GitHub VCS repository entry with a local path so Composer never
        # hits the GitHub commits API (which is throttled in CI with HTTP 429).
        env:
          COMPOSER_AUTH: >-
            {"github-oauth":{"github.com":"${{ github.token }}"}}
        run: |
          jq '.repositories = [{"type": "path", "url": "/tmp/sqlite-database-integration", "options": {"symlink": false}}]' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json
          composer install --no-interaction --prefer-source

      - name: Set up MySQL
        if: matrix.database == 'mysql'
        run: |
          sudo /etc/init.d/mysql start
          bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest

      - name: Set up SQLite
        if: matrix.database == 'sqlite'
        run: bash bin/install-wp-tests-sqlite.sh

      - name: Run tests
        run: vendor/bin/phpunit -c ${{ matrix.phpunit-config }}
